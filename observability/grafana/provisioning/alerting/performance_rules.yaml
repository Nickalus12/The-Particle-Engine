      - uid: pe-creature-budget-breach-streak
        title: Creature Tick/Render Budget Breach Streak
        condition: G
        for: 2m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: "Creature tick/render p95 exceeded budgets for sustained window."
        labels:
          severity: warning
          service: particle-engine
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: histogram_quantile(0.95, sum by (le) (rate(particle_engine_creature_tick_duration_ms_bucket[10m])))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: histogram_quantile(0.95, sum by (le) (rate(particle_engine_creature_render_duration_ms_bucket[10m])))
