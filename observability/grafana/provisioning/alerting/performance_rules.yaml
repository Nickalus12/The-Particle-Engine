      - uid: pe-creature-spawn-success-regression
        title: Creature Spawn Success Regression
        condition: C
        for: 5m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: "Creature spawn success ratio dropped below 0.60."
        labels:
          severity: warning
