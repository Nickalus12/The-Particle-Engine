apiVersion: 1

groups:
  - orgId: 1
    name: particle-engine-performance
    folder: Particle Engine
    interval: 1m
    rules:
      - uid: pe-timeout-targets
        title: Timed Out Performance Targets
        condition: C
        for: 0m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: "Performance pipeline reported timed-out targets."
        labels:
          severity: warning
          service: particle-engine
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: sum(increase(particle_engine_targets_timed_out_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
      - uid: pe-quality-score-low
        title: Quality Score Below Threshold
        condition: C
        for: 5m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: "Quality score fell below 75."
        labels:
          severity: warning
          service: particle-engine
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: histogram_quantile(0.5, sum by (le) (rate(particle_engine_quality_score_bucket[10m])))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 75
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
      - uid: pe-mobile-component-regression
        title: Mobile Component Score Regression
        condition: C
        for: 5m
        noDataState: NoData
        execErrState: Error
