      - uid: pe-quality-gate-failure-streak
        title: Quality Gate Failure Streak
        condition: C
        for: 1m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: "Quality gate failures exceeded streak budget in 24h."
        labels:
          severity: critical
          service: particle-engine
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: sum(increase(particle_engine_quality_gate_failed_total[24h]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 3
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
