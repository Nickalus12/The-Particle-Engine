                type: prometheus
                uid: prometheus
              editorMode: code
              expr: histogram_quantile(0.5, sum by (le) (rate(particle_engine_quality_component_score_bucket{component=\"mobile_score\"}[10m])))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 70
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
      - uid: pe-performance-component-regression
