name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly Saturday at 06:00 UTC — ThunderCompute training (if budget)
    - cron: "0 6 * * 6"

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.32.0"
  DART_VERSION: "3.8.0"

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Flutter analysis + Dart tests (every push)
  # -----------------------------------------------------------------------
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run Flutter tests with coverage
        run: |
          mkdir -p build/quality
          flutter test --coverage --machine --no-pub > build/quality/unit.machine.jsonl
          flutter test --machine --no-pub test/smoke > build/quality/smoke.machine.jsonl
          python3 - <<'PY'
          import json
          from pathlib import Path
          def summarize(path: Path, lane: str) -> None:
              total = 0
              failed = 0
              if path.exists():
                  for line in path.read_text(encoding="utf-8", errors="ignore").splitlines():
                      line = line.strip()
                      if not line:
                          continue
                      try:
                          evt = json.loads(line)
                      except Exception:
                          continue
                      if evt.get("type") != "testDone" or evt.get("hidden", False):
                          continue
                      total += 1
                      if evt.get("result") != "success":
                          failed += 1
              out = {
                  "lane": lane,
                  "total": total,
                  "failed": failed,
                  "return_code": 0 if total > 0 and failed == 0 else 1,
              }
              Path(f"build/quality/{lane}_lane_summary.json").write_text(
                  json.dumps(out),
                  encoding="utf-8",
              )

          summarize(Path("build/quality/unit.machine.jsonl"), "unit")
          summarize(Path("build/quality/smoke.machine.jsonl"), "smoke")
          PY

      - name: Enforce coverage floor
        run: python3 tool/check_coverage.py coverage/lcov.info --min 45

      - name: Publish coverage summary
        if: always()
        run: |
          if [ -f .coverage-summary.txt ]; then
            cat .coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-lcov
          path: coverage/lcov.info

      - name: Upload quality lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analyze-quality-artifacts
          path: build/quality/**

  # -----------------------------------------------------------------------
  # Job 2: Python physics test suite (every push)
  # -----------------------------------------------------------------------
  pytest:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install numpy scipy scikit-image colour-science optuna \
                    hypothesis pytest pytest-xdist Pillow

      - name: Export simulation frame (needed by visual tests)
        run: |
          flutter pub get
          dart run research/export_frame.dart 100

      - name: Generate ground truth
        run: python research/physics_oracle.py

      - name: Generate visual ground truth
        run: python research/visual_oracle.py

      - name: Run pytest suite
        run: |
          mkdir -p build/quality
          cd research
          python -m pytest tests/ -v --tb=short -x \
            --ignore=tests/test_snapshots.py \
            -k "not test_visual_quality" \
            --junitxml ../build/quality/python_pytest.xml
        timeout-minutes: 15

      - name: Write python lane summary
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          from pathlib import Path
          p = Path("build/quality/python_pytest.xml")
          total = failed = 0
          if p.exists():
              root = ET.parse(p).getroot()
              suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
              for s in suites:
                  total += int(s.attrib.get("tests", 0))
                  failed += int(s.attrib.get("failures", 0)) + int(s.attrib.get("errors", 0))
          out = {
              "lane": "python",
              "total": total,
              "failed": failed,
              "return_code": 0 if total > 0 and failed == 0 else 1,
          }
          Path("build/quality/python_lane_summary.json").write_text(json.dumps(out), encoding="utf-8")
          PY

      - name: Upload python quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-quality-artifacts
          path: build/quality/**

  # -----------------------------------------------------------------------
  # Job 3: Integration tests for trained genomes (on PR)
  # -----------------------------------------------------------------------
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install numpy pytest

      - name: Run genome integration tests
        run: |
          mkdir -p build/quality
          cd research
          python -m pytest tests/test_integration.py -v --tb=short --junitxml ../build/quality/integration_pytest.xml

      - name: Upload integration quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-quality-artifacts
          path: build/quality/**

  # -----------------------------------------------------------------------
  # Job 4: Full benchmark in CI mode (on PR, optional)
  # -----------------------------------------------------------------------
  benchmark:
    name: Benchmark (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-benchmark')
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install numpy scipy scikit-image colour-science optuna \
                    hypothesis pytest pytest-xdist Pillow neat-python

      - name: Export simulation frame
        run: |
          flutter pub get
          dart run research/export_frame.dart 100

      - name: Generate ground truths
        run: |
          python research/physics_oracle.py
          python research/visual_oracle.py

      - name: Run full test suite
        run: |
          cd research
          python -m pytest tests/ -v --tb=short -x
        timeout-minutes: 30

      - name: Run Dart engine benchmark
        run: dart run research/cloud/fast_benchmark.dart

  # -----------------------------------------------------------------------
  # Job 5: Performance telemetry pipeline (push/PR)
  # -----------------------------------------------------------------------
  performance-telemetry:
    name: Performance Telemetry
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Pipeline contract tests
        run: python -m unittest discover -s tool/performance/tests -p "test_*.py" -v

      - name: Run performance pipeline
        run: |
          python tool/performance/run_performance_pipeline.py \
            --profile pr \
            --target-timeout-seconds 180 \
            --require-telemetry-complete

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-telemetry-artifacts
          path: reports/performance/runs/**

  quality-score-push:
    name: Quality Score Aggregation (Push)
    runs-on: ubuntu-latest
    needs: [analyze, pytest, performance-telemetry]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download lane artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/quality-inputs
          merge-multiple: true

      - name: Build quality score run
        run: |
          python tool/performance/run_quality_pipeline.py \
            --profile pr \
            --mode ingest \
            --artifact-root build/quality-inputs \
            --gate-start-date 2026-03-27

      - name: Upload quality score artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-score-artifacts
          path: reports/performance/runs/**

  quality-score-pr:
    name: Quality Score Aggregation (PR)
    runs-on: ubuntu-latest
    needs: [analyze, pytest, integration, performance-telemetry]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download lane artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/quality-inputs
          merge-multiple: true

      - name: Build quality score run
        run: |
          python tool/performance/run_quality_pipeline.py \
            --profile pr \
            --mode ingest \
            --artifact-root build/quality-inputs \
            --gate-start-date 2026-03-27

      - name: Upload quality score artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-score-artifacts
          path: reports/performance/runs/**

  # -----------------------------------------------------------------------
  # Job 6: Weekly ThunderCompute training (Saturday, budget-gated)
  # -----------------------------------------------------------------------
  nightly-soak:
    name: Nightly Soak Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run nightly performance profile
        run: |
          python tool/performance/run_performance_pipeline.py \
            --profile nightly \
            --require-telemetry-complete

      - name: Upload nightly perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-performance-artifacts
          path: reports/performance/runs/**

  nightly-android-lane:
    name: Nightly Android Investigative Lane
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run android investigative lane
        run: |
          python tool/performance/run_android_investigative_lane.py --target-timeout-seconds 180

      - name: Upload nightly android artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-android-artifacts
          path: reports/performance/runs/**

  nightly-quality-score:
    name: Nightly Quality Score Aggregation
    runs-on: ubuntu-latest
    needs: [nightly-soak, nightly-android-lane]
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download nightly artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/quality-inputs
          merge-multiple: true

      - name: Build nightly quality score run
        run: |
          python tool/performance/run_quality_pipeline.py \
            --profile nightly \
            --mode ingest \
            --artifact-root build/quality-inputs \
            --gate-start-date 2026-03-27

      - name: Upload nightly quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-quality-score-artifacts
          path: reports/performance/runs/**

  # -----------------------------------------------------------------------
  # Job 7: Weekly ThunderCompute training (Saturday, budget-gated)
  # -----------------------------------------------------------------------
  weekly-train:
    name: Weekly Cloud Training
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install numpy scipy optuna

      - name: Budget check
        env:
          WEEKLY_BUDGET: "5.00"
        run: |
          python research/cloud/cost_tracker.py check \
            --gpu a100xl --hours 2 --budget $WEEKLY_BUDGET || \
          echo "::warning::Over budget, skipping cloud training"

      - name: Cloud training (placeholder)
        if: success()
        run: |
          echo "Weekly cloud training would run here."
          echo "To enable: set TNR_API_TOKEN secret and uncomment deploy_and_run.py call"
          # python research/cloud/deploy_and_run.py --mode creatures --gpu a100xl
