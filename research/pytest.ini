[pytest]
testpaths = research/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    visual: marks visual quality tests
    physics: marks physics accuracy tests
    performance: marks performance tests
    benchmark: marks performance benchmarks
    property: marks property-based tests
    snapshot: marks snapshot regression tests
addopts = -v --tb=short
benchmark_disable_gc = true
benchmark_min_rounds = 3
