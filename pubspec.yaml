name: the_particle_engine
description: "A living particle sandbox where physics are real, elements react, and AI colonies evolve intelligence."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.29.0
  flame_audio: ^2.12.0
  flame_isolate: ^0.6.2+21
  flutter_svg: ^2.0.17
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/elements/
    - assets/audio/sfx/
    - assets/audio/ambient/
    - assets/audio/music/
    - assets/images/ui/
    - assets/images/backgrounds/
    - assets/shaders/
